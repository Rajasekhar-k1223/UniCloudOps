name: UniCloudOps Supply Chain Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for keyless Cosign signing

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t my-registry.com/unicloudops/app:${{ github.sha }} ./backend

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: my-registry.com/unicloudops/app:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-registry.com/unicloudops/app:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Fail pipeline if vulnerabilities found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push to Registry
        run: docker push my-registry.com/unicloudops/app:${{ github.sha }}
        # Note: In a real pipeline, ensure docker login happens prior to this step

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.1.1

      - name: Sign Image with Cosign (Keyless)
        run: cosign sign --yes my-registry.com/unicloudops/app:${{ github.sha }}
        
      # The final step would normally curl the UniCloudOps backend /supply-chain API 
      # to upload the SBOM and register the successful signing event.
